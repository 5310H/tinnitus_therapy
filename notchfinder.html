<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notch Finder Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="storage.js"></script>
<script src="nav.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="panel">
    <h1>Notch Finder Tool</h1>
    <p class="info">Identify your tinnitus pitch to calibrate Notch Therapy.</p>

    <div class="ctrl">
        <label>Frequency (Hz) <input type="number" id="freqInput" class="val-input" value="1000" min="100" max="16000"></label>
        <input id="freqSlider" type="range" min="100" max="16000" value="1000" step="10">
    </div>

    <div class="btn-group">
        <button class="button" data-delta="-100">– 100</button>
        <button class="button" data-delta="-10">– 10</button>
        <button class="button" data-delta="10">+ 10</button>
        <button class="button" data-delta="100">+ 100</button>
    </div>

    <div class="ctrl">
        <label>Volume <span class="val" id="volVal">20%</span></label>
        <input id="volSlider" type="range" min="0" max="100" value="20">
    </div>

    <div class="btn-group">
        <button class="button" id="sweepBtn">Start Auto-Sweep</button>
    </div>

    <button class="big-btn" id="playBtn">Play Tone</button>
    <button class="big-btn" style="background:#252545; border:1px solid #333" id="saveBtn">Save to Therapy Settings</button>
    
    <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
        <button class="button" onclick="exportClinicalSettings()">Clinical Export (.txt)</button>
        <button class="button" style="background:var(--accent); color:white;" onclick="emailToAudiologist()">Email to Audiologist</button>
    </div>

    <div id="savedMsg"></div>
</div>

<script>
let audioCtx = null, osc = null, gainNode = null, playing = false;

const slider = document.getElementById("freqSlider");
const freqInput = document.getElementById("freqInput");
const volSlider = document.getElementById("volSlider");
const volLabel = document.getElementById("volVal");
const playBtn = document.getElementById("playBtn");
const sweepBtn = document.getElementById("sweepBtn");
const saveBtn = document.getElementById("saveBtn");
const savedMsg = document.getElementById("savedMsg");

/* PLAY TONE */
function playTone(freq) {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    stopTone(); // ensure only one tone plays

    osc = audioCtx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;
    
    gainNode = audioCtx.createGain();
    gainNode.gain.value = volSlider.value / 100;

    osc.connect(gainNode).connect(audioCtx.destination);
    osc.start();

    playing = true;
    playBtn.textContent = "Stop Tone";
    playBtn.classList.add("stop-btn");
}

/* STOP TONE */
function stopTone() {
    if (audioCtx) {
        if (osc) { try { osc.stop(); } catch(e) {} osc = null; }
    }
    playing = false;
    stopSweep();
    playBtn.textContent = "Play Tone";
    playBtn.classList.remove("stop-btn");
}

/* UPDATE LABEL */
function updateLabel() {
    freqInput.value = slider.value;
    if (playing && osc) {
        osc.frequency.setTargetAtTime(slider.value, audioCtx.currentTime, 0.05);
    }
}

let sweeping = false, lastStepTime = 0;
function stopSweep() {
    sweeping = false;
    sweepBtn.textContent = "Start Auto-Sweep";
}

function runSweep(time) {
    if (!sweeping || !playing) {
        stopSweep();
        return;
    }
    // Move frequency up exponentially (doubles every ~12 seconds at 20fps)
    if (time - lastStepTime > 50) {
        let val = Number(slider.value);
        val = val * Math.pow(2, 1/240); 
        if (val > 16000) val = 100;
        slider.value = Math.round(val);
        updateLabel();
        lastStepTime = time;
    }
    requestAnimationFrame(runSweep);
}

slider.oninput = () => {
    stopSweep();
    updateLabel();
};

freqInput.oninput = () => {
    stopSweep();
    let val = Math.min(16000, Math.max(100, freqInput.value));
    slider.value = val;
    updateLabel();
};

volSlider.oninput = () => {
    volLabel.textContent = volSlider.value + "%";
    if (playing && gainNode) {
        gainNode.gain.setTargetAtTime(volSlider.value / 100, audioCtx.currentTime, 0.05);
    }
};

/* BUTTON REPEAT LOGIC */
let repeatTimeout, repeatInterval;
function startRepeat(delta) {
    const step = () => {
        stopSweep();
        slider.value = Math.min(16000, Math.max(100, Number(slider.value) + delta));
        updateLabel();
    };
    step();
    repeatTimeout = setTimeout(() => {
        repeatInterval = setInterval(step, 80);
    }, 500);
}
function stopRepeat() {
    clearTimeout(repeatTimeout);
    clearInterval(repeatInterval);
}

document.querySelectorAll('.btn-group .button[data-delta]').forEach(btn => {
    const delta = parseInt(btn.dataset.delta);
    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); startRepeat(delta); };
    btn.onmouseup = btn.onmouseleave = btn.ontouchend = stopRepeat;
    // Accessible fallback
    btn.onclick = (e) => { if(!repeatInterval) startRepeat(delta); stopRepeat(); };
});

sweepBtn.onclick = () => {
    if (sweeping) {
        stopSweep();
    } else {
        if (!playing) playTone(slider.value);
        sweeping = true;
        sweepBtn.textContent = "Stop Auto-Sweep";
        lastStepTime = performance.now();
        requestAnimationFrame(runSweep);
    }
};

playBtn.onclick = () => {
    if (!playing) playTone(slider.value);
    else stopTone();
};

saveBtn.onclick = () => {
    saveSetting("notch", slider.value);
    saveSetting("toneFreq", slider.value);
    savedMsg.textContent = "Frequency saved to therapy settings.";
    setTimeout(() => savedMsg.textContent = "", 1500);
};

function getReportData() {
    return {
        "Target Frequency": slider.value + " Hz",
        "Test Volume": volSlider.value + "%",
        "Method": "Manual Slider / Auto-Sweep"
    };
}

function exportClinicalSettings() {
    const report = generateClinicalReport("Notch Finder (Pitch Matching)", getReportData());
    const blob = new Blob([report], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tinnitus_clinical_notch_finder.txt`;
    a.click();
}

function emailToAudiologist() {
    const email = loadSetting('audiologist_email', '');
    if (!email) return alert("Please set your audiologist's email on the Home page.");
    const report = generateClinicalReport("Notch Finder (Pitch Matching)", getReportData());
    window.location.href = `mailto:${email}?subject=Tinnitus Clinical Report&body=${encodeURIComponent(report)}`;
}

window.onload = () => {
    initNav(`Use the slider or the <b>Auto-Sweep</b> feature to find a tone that matches the pitch of your tinnitus. Auto-sweep slowly raises the pitch to help you identify the "crossing point." Once matched, save the frequency to use it in Notch Therapy.`);
    slider.value = loadSetting("notch", 6000);
    updateLabel();
};
</script>
</body>
</html>
