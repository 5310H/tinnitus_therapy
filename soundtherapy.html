<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Therapy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
        text-align: center;
        transition: background 0.3s, color 0.3s;
    }

    /* Top bar */
    .top-bar {
        width: 100%;
        background: #0078ff;
        color: white;
        padding: 12px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .top-bar button {
        background: white;
        color: #0078ff;
        border: none;
        padding: 10px 16px;
        margin: 0 10px;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s, color 0.3s;
    }

    h1 {
        margin-top: 20px;
        margin-bottom: 5px;
        transition: color 0.3s;
    }

    .control-group {
        background: white;
        padding: 15px;
        margin: 15px;
        border-radius: 10px;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
        transition: background 0.3s, color 0.3s, box-shadow 0.3s;
    }

    button {
        padding: 12px 20px;
        margin: 8px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #0078ff;
        color: white;
        cursor: pointer;
        transition: background 0.3s, color 0.3s;
    }

    button:active {
        background: #005fcc;
    }

    input[type=range] {
        width: 90%;
    }

    /* ---------------- DARK MODE ---------------- */

    body.dark {
        background: #1e1e1e;
        color: #e6e6e6;
    }

    body.dark .top-bar {
        background: #111;
        color: white;
    }

    body.dark .top-bar button {
        background: #333;
        color: #fff;
    }

    body.dark .control-group {
        background: #2a2a2a;
        color: #e6e6e6;
        box-shadow: 0 0 5px rgba(255,255,255,0.1);
    }

    body.dark button {
        background: #444;
        color: #fff;
    }

    body.dark button:active {
        background: #666;
    }
</style>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
    <button onclick="location.href='index.html'">Home</button>
    <div>
        <button onclick="toggleDarkMode()">Dark Mode</button>
        <button onclick="stopAll()">Stop</button>
    </div>
</div>

<h1>Sound Therapy</h1>
<p>White, pink, brown noise + real nature sounds</p>

<div class="control-group">
    <h3>Noise Types</h3>
    <button onclick="playNoise('white')">White Noise</button>
    <button onclick="playNoise('pink')">Pink Noise</button>
    <button onclick="playNoise('brown')">Brown Noise</button>
</div>

<div class="control-group">
    <h3>Nature Sounds (Sample‑Based)</h3>
    <button onclick="playSample('rain')">Rain</button>
    <button onclick="playSample('ocean')">Ocean</button>
    <button onclick="playSample('costal')">Coastal Ocean</button>
    <button onclick="playSample('stream')">Stream</button>
    <button onclick="playSample('wild')">Wild Stream</button>
    <button onclick="playSample('wind')">Wind</button>
</div>

<div class="control-group">
    <h3>Volume</h3>
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.3" oninput="setVolume(this.value)">
</div>

<div class="control-group">
    <h3>Left / Right Balance</h3>
    <input id="balance" type="range" min="-1" max="1" step="0.01" value="0" oninput="setBalance(this.value)">
</div>

<div class="control-group">
    <h3>Session Timer (minutes)</h3>
    <input id="timer" type="number" min="1" max="120" value="10">
    <button onclick="startTimer()">Start Timer</button>
    <p id="timerDisplay"></p>
</div>

<script>
let audioCtx;
let currentSource = null;
let gainNode;
let pannerNode;
let timerInterval;

/* DARK MODE */
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

/* AUDIO INIT */
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        pannerNode = audioCtx.createStereoPanner();
        gainNode.connect(pannerNode).connect(audioCtx.destination);
    }
}

/* NOISE GENERATION */
function createNoise(type) {
    const bufferSize = 2 * audioCtx.sampleRate;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);

    if (type === 'white') {
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    }
    if (type === 'pink') {
        let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179;
            b1 = 0.99332 * b1 + white * 0.0750759;
            b2 = 0.96900 * b2 + white * 0.1538520;
            b3 = 0.86650 * b3 + white * 0.3104856;
            b4 = 0.55000 * b4 + white * 0.5329522;
            b5 = -0.7616 * b5 - white * 0.0168980;
            data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
            data[i] *= 0.11;
            b6 = white * 0.115926;
        }
    }
    if (type === 'brown') {
        let lastOut = 0;
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            data[i] = (lastOut + 0.02 * white) / 1.02;
            lastOut = data[i];
            data[i] *= 3.5;
        }
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;
    return noise;
}

/* PLAY NOISE */
function playNoise(type) {
    initAudio();
    stopAll();
    currentSource = createNoise(type);
    currentSource.connect(gainNode);
    currentSource.start();
}

/* PLAY SAMPLE */
function playSample(type) {
    initAudio();
    stopAll();

    const fileMap = {
        rain: 'audio/rain.mp3',
        ocean: 'audio/ocean.mp3',
        costal: 'audio/ocean_coast.mp3',
        stream: 'audio/stream.mp3',
        wild: 'audio/loud_stream.mp3',
        wind: 'audio/wind.mp3'
    };

    const audio = new Audio(fileMap[type]);
    audio.loop = true;

    const track = audioCtx.createMediaElementSource(audio);
    track.connect(gainNode);

    audio.play();
    currentSource = audio;
}

/* VOLUME */
function setVolume(v) {
    initAudio();
    gainNode.gain.value = v;
}

/* BALANCE */
function setBalance(v) {
    initAudio();
    pannerNode.pan.value = v;
}

/* TIMER */
function startTimer() {
    const minutes = parseInt(document.getElementById("timer").value);
    let remaining = minutes * 60;

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        remaining--;
        document.getElementById("timerDisplay").innerText =
            "Time left: " + Math.floor(remaining / 60) + ":" + (remaining % 60).toString().padStart(2, '0');

        if (remaining <= 0) {
            stopAll();
            clearInterval(timerInterval);
            document.getElementById("timerDisplay").innerText = "Session complete";
        }
    }, 1000);
}

/* STOP EVERYTHING */
function stopAll() {
    if (currentSource) {
        try { currentSource.pause(); currentSource.currentTime = 0; } catch(e) {}
        try { currentSource.stop(); } catch(e) {}
        currentSource = null;
    }
}
</script>

</body>
</html>
