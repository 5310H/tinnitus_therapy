<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Therapy</title>
<script src="storage.js"></script>
<script src="nav.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="panel">
    <h1>Sound Therapy</h1>
    <p class="info">Nature sounds and calibrated broadband noise.</p>

    <div class="ctrl">
        <h3>Noise Types</h3>
        <div class="btn-grid">
            <button class="sm-btn" onclick="playNoise('white', this)">White</button>
            <button class="sm-btn" onclick="playNoise('pink', this)">Pink</button>
            <button class="sm-btn" onclick="playNoise('brown', this)">Brown</button>
            <button class="sm-btn stop-btn" onclick="stopAll()">Stop</button>
        </div>
    </div>

    <div class="ctrl">
        <h3>Nature Sounds</h3>
        <div class="btn-grid">
            <button class="sm-btn" onclick="playSample('rain', this)">Rain</button>
            <button class="sm-btn" onclick="playSample('ocean', this)">Ocean</button>
            <button class="sm-btn" onclick="playSample('stream', this)">Stream</button>
            <button class="sm-btn" onclick="playSample('wind', this)">Wind</button>
        </div>
    </div>

    <div class="ctrl">
        <label>Volume (%) <input type="number" id="volInput" class="val-input" min="0" max="100" value="30"></label>
        <input id="volume" type="range" min="0" max="100" value="30">
        <div class="btn-group" data-target="volume">
            <button class="button-step" data-delta="-5">-5</button>
            <button class="button-step" data-delta="5">+5</button>
        </div>

        <label style="display:block;margin-top:10px">L/R Balance <input type="number" id="balInput" class="val-input" min="-1" max="1" step="0.1" value="0"></label>
        <input id="balance" type="range" min="-1" max="1" step="0.02" value="0">
        <div class="btn-group" data-target="balance">
            <button class="button-step" data-delta="-0.1">-0.1</button>
            <button class="button-step" data-delta="0.1">+0.1</button>
        </div>
        <div class="bal-viz">
            <div class="bal-track"><div id="balMarker" class="bal-marker"></div></div>
            <div class="bal-labels"><span>Left</span><span>Center</span><span>Right</span></div>
        </div>
    </div>

    <div class="ctrl" style="text-align:center">
        <h3>Session Timer</h3>
        <input id="timer" type="number" min="1" max="120" value="10" style="width:60px;padding:5px;border-radius:4px;border:1px solid #333;background:#0a0a1a;color:#fff"> min
        <button class="big-btn" onclick="startTimer()">Start Timer</button>
        <p id="timerDisplay" style="margin-top:10px;color:#ab47bc;font-weight:700"></p>
        <div class="usage-progress">
            <div id="usageBar" class="usage-bar" style="width: 0%"></div>
        </div>
        <div id="usageText" class="usage-text">Today's Progress: 0 / 20 mins</div>
    </div>
</div>

<script>
let audioCtx,currentSource,gainNode,pannerNode,timerInterval;

window.onload = () => {
    initNav(`
        <b>Purpose:</b> Reduces contrast between tinnitus and silence, helping the brain ignore the phantom signal.<br><br>
        <b>Usage:</b> Aim for "partial masking" where you can still hear the tinnitus slightly behind the noise.<br><br>
        <b>Nature Sounds:</b> Useful for long sessions to reduce "listener fatigue."
    `);

    const v = loadSetting('st_vol', 30);
    const b = loadSetting('st_bal', 0);
    document.getElementById('volume').value = v;
    document.getElementById('balance').value = b;
    updateLabels();
    setupStepButtons();
    refreshUsageUI();
};

function refreshUsageUI() {
    const goal = loadSetting('daily_goal', 20);
    const current = getDailyUsage();
    document.getElementById('usageBar').style.width = Math.min(100, (current / goal) * 100) + '%';
    document.getElementById('usageText').textContent = `Today's Progress: ${Math.round(current)} / ${goal} mins`;
}

let repeatTimeout, repeatInterval;
function setupStepButtons() {
    document.querySelectorAll('.btn-group .button-step').forEach(btn => {
        const delta = parseFloat(btn.dataset.delta);
        const target = document.getElementById(btn.parentElement.dataset.target);
        const step = () => {
            let val = (parseFloat(target.value) + delta);
            if (target.step.includes('.')) val = parseFloat(val.toFixed(1));
            target.value = Math.min(target.max, Math.max(target.min, val));
            target.dispatchEvent(new Event('input'));
        };
        btn.onmousedown = btn.ontouchstart = (e) => {
            e.preventDefault(); step();
            repeatTimeout = setTimeout(() => { repeatInterval = setInterval(step, 80); }, 500);
        };
        btn.onmouseup = btn.onmouseleave = btn.ontouchend = () => { clearInterval(repeatInterval); clearTimeout(repeatTimeout); repeatInterval = null; };
        btn.onclick = () => { if(!repeatInterval) step(); };
    });
}

function updateLabels(){
    document.getElementById('volInput').value = document.getElementById('volume').value;
    const b = document.getElementById('balance').value;
    document.getElementById('balInput').value = b;
    document.getElementById('balMarker').style.left = ((parseFloat(b) + 1) / 2 * 100) + '%';
}

document.getElementById('volInput').oninput = e => {
    document.getElementById('volume').value = e.target.value;
    document.getElementById('volume').dispatchEvent(new Event('input'));
};
document.getElementById('balInput').oninput = e => {
    document.getElementById('balance').value = e.target.value;
    document.getElementById('balance').dispatchEvent(new Event('input'));
};

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        pannerNode = audioCtx.createStereoPanner();
        gainNode.connect(pannerNode).connect(audioCtx.destination);
        syncAudioNodes();
    }
}
function syncAudioNodes() { setVolume(document.getElementById('volume').value); setBalance(document.getElementById('balance').value); }

function playNoise(type, btn) {
    initAudio(); stopAll();
    setActiveBtn(btn);
    const bufSize = 2 * audioCtx.sampleRate, buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate), d = buf.getChannelData(0);
    if(type==='white'){for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1}
    else if(type==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<bufSize;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8687*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926}}
    else{let last=0;for(let i=0;i<bufSize;i++){const w=Math.random()*2-1;d[i]=(last+0.02*w)/1.02;last=d[i];d[i]*=3.5}}
    currentSource = audioCtx.createBufferSource(); currentSource.buffer = buf; currentSource.loop = true;
    currentSource.connect(gainNode); currentSource.start();
}

function playSample(type, btn) {
    initAudio(); stopAll();
    setActiveBtn(btn);
    const fileMap = { rain:'audio/rain.mp3', ocean:'audio/ocean.mp3', stream:'audio/stream.mp3', wind:'audio/wind.mp3' };
    const audio = new Audio(fileMap[type]); audio.loop = true;
    const track = audioCtx.createMediaElementSource(audio); track.connect(gainNode);
    audio.play(); currentSource = audio;
}

function setVolume(v) { if(gainNode) gainNode.gain.value = v / 100; document.getElementById('volInput').value = v; saveSetting('st_vol', v); }
function setBalance(v) { 
    if(pannerNode) pannerNode.pan.value = v; 
    document.getElementById('balInput').value = v; 
    document.getElementById('balMarker').style.left = ((parseFloat(v) + 1) / 2 * 100) + '%';
    saveSetting('st_bal', v); 
}

document.getElementById('volume').oninput = e => { setVolume(e.target.value); };
document.getElementById('balance').oninput = e => { setBalance(e.target.value); };

function stopAll() {
    if(currentSource) { try{currentSource.pause()}catch(e){}; try{currentSource.stop()}catch(e){}; currentSource=null; }
    document.querySelectorAll('.sm-btn').forEach(b=>b.classList.remove('active'));
}

function setActiveBtn(btn) {
    document.querySelectorAll('.sm-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
}

function startTimer() {
    const minutes = parseInt(document.getElementById("timer").value);
    let rem = minutes * 60;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        rem--; document.getElementById("timerDisplay").innerText = "Time left: "+Math.floor(rem/60)+":"+(rem%60).toString().padStart(2,'0');
        if(rem<=0){
            logUsageMinutes(minutes);
            stopAll();
            clearInterval(timerInterval);
            document.getElementById("timerDisplay").innerText = "Complete";
            refreshUsageUI();
        }
    }, 1000);
}
</script>
</body>
</html>
