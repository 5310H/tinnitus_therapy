<!DOCTYPE html>
<html lang="en">
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
a.back{position:fixed;top:1rem;left:1rem;color:#ab47bc;text-decoration:none;font-size:.9rem;z-index:10}
.panel{max-width:520px;width:90%;margin:3rem auto}
h1{font-size:1.8rem;margin-bottom:.3rem;color:#ab47bc;text-align:center}
.info{color:#888;font-size:.85rem;margin-bottom:2rem;text-align:center}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinnitus Therapy</title>
    <style>
        /* Styles for top navigation bar */
        .navbar {
            background-color: #0078ff;
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }
        .navbar button {
            background-color: darkblue;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        /* Card styling matching notchfinder.html */
        .card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body><a class="back" href="index.html">Home</a>
    <div class="navbar">
        <button onclick="window.location.href='home.html'">Home</button>
        <button onclick="stopAudio()">Stop</button>
        <button id="helpBtn">Help</button>
    </div>

    <div class="card">
        <h2>Two-Tone Comparison</h2>
        <p>Use the buttons above to navigate or stop audio playback.</p>
    </div>

    <div id="helpModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color: rgba(0,0,0,0.5);">
        <div style="background:white; padding:20px; margin:100px auto; width:300px;">
            <h3>Help</h3>
            <p>This functionality allows you to compare two tones.</p>
            <button onclick="document.getElementById('helpModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        let audioPlayback = null;

        function stopAudio() {
            if (audioPlayback) {
                audioPlayback.pause();
                audioPlayback.currentTime = 0;
            } else {
                console.error('No audio is currently playing.');
            }
        }

        document.getElementById('helpBtn').onclick = function() {
            document.getElementById('helpModal').style.display='block';
        };
    </script>
</body>
</html>
