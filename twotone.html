<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-Tone Comparison</title>
<link rel="stylesheet" href="style.css">
<script src="storage.js"></script>
<script src="nav.js"></script>
</head>
<body>
    <div class="panel">
        <h1>Two-Tone Comparison</h1>
        <p class="info">Compare two tones for pitch matching.</p>
        
        <div class="card">
            <h3>Tone A</h3>
            <div class="ctrl">
                <label>Frequency (Hz) <input type="number" id="freqAInput" class="val-input" value="4000" min="100" max="16000"></label>
                <input id="freqASlider" type="range" min="100" max="16000" value="4000" step="10">
            </div>
            <div class="btn-group" data-target="freqASlider">
                <button class="button-step" data-delta="-100">-100</button>
                <button class="button-step" data-delta="-10">-10</button>
                <button class="button-step" data-delta="10">+10</button>
                <button class="button-step" data-delta="100">+100</button>
            </div>
            <button class="button" onclick="playTone('A')">Play Tone A</button>
            <button class="button" style="background:var(--surface)" onclick="saveToNotch('A')">Save A to Notch</button>
        </div>

        <div class="card">
            <h3>Tone B</h3>
            <div class="ctrl">
                <label>Frequency (Hz) <input type="number" id="freqBInput" class="val-input" value="8000" min="100" max="16000"></label>
                <input id="freqBSlider" type="range" min="100" max="16000" value="8000" step="10">
            </div>
            <div class="btn-group" data-target="freqBSlider">
                <button class="button-step" data-delta="-100">-100</button>
                <button class="button-step" data-delta="-10">-10</button>
                <button class="button-step" data-delta="10">+10</button>
                <button class="button-step" data-delta="100">+100</button>
            </div>
            <button class="button" onclick="playTone('B')">Play Tone B</button>
            <button class="button" style="background:var(--surface)" onclick="saveToNotch('B')">Save B to Notch</button>
        </div>

        <div class="ctrl" style="margin-top:2rem">
            <label>Master Volume <span class="val" id="volVal">20%</span></label>
            <input id="volSlider" type="range" min="0" max="100" value="20">
        </div>

        <div class="btn-group">
            <button class="button" onclick="playBoth()">Play Both</button>
            <button class="button stop-btn" onclick="stopAudio()">Stop All</button>
        </div>

        <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <button class="button" onclick="exportClinicalSettings()">Clinical Export (.txt)</button>
            <button class="button email-audiologist-btn" style="background:var(--accent); color:white; display:none;" onclick="emailToAudiologist()">Email to Audiologist</button>
        </div>
    </div>

    <script>
        let ctx = null, oscA = null, oscB = null, gA = null, gB = null;

        window.onload = () => {
            initNav("Use two tones to 'bracket' your tinnitus. By comparing two reference points, you can avoid common pitch-matching errors like 'octave confusion'. Match one tone, then adjust the other until you find the true frequency.");
            setupStepButtons();
            updateUI();
        };

        function initAudio() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function updateUI() {
            document.getElementById('freqAInput').value = document.getElementById('freqASlider').value;
            document.getElementById('freqBInput').value = document.getElementById('freqBSlider').value;
            document.getElementById('volVal').textContent = document.getElementById('volSlider').value + '%';
        }

        function playTone(type) {
            initAudio();
            const freq = document.getElementById(`freq${type}Slider`).value;
            const vol = document.getElementById('volSlider').value / 100;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.value = vol;
            
            osc.connect(gain).connect(ctx.destination);
            osc.start();
            
            if (type === 'A') { 
                if (oscA) { try { oscA.stop(); } catch(e) {} }
                oscA = osc; gA = gain; 
            } else { 
                if (oscB) { try { oscB.stop(); } catch(e) {} }
                oscB = osc; gB = gain; 
            }
        }

        function playBoth() {
            initAudio();
            stopAudio();
            playTone('A');
            playTone('B');
        }

        function stopAudio() {
            if (oscA) { try { oscA.stop(); } catch(e) {} oscA = null; }
            if (oscB) { try { oscB.stop(); } catch(e) {} oscB = null; }
        }

        function saveToNotch(type) {
            const freq = document.getElementById(`freq${type}Slider`).value;
            saveSetting('notch', freq);
            saveSetting('toneFreq', freq);
            alert(`Frequency ${freq}Hz saved as your tinnitus pitch.`);
        }

        function setupStepButtons() {
            document.querySelectorAll('.btn-group .button-step').forEach(btn => {
                const delta = parseInt(btn.dataset.delta);
                const targetId = btn.parentElement.dataset.target;
                const target = document.getElementById(targetId);
                btn.onclick = () => {
                    target.value = Math.min(target.max, Math.max(target.min, Number(target.value) + delta));
                    target.dispatchEvent(new Event('input'));
                };
            });
        }

        function getReportData() {
            return {
                "Tone A Frequency": document.getElementById('freqASlider').value + " Hz",
                "Tone B Frequency": document.getElementById('freqBSlider').value + " Hz",
                "Master Volume": document.getElementById('volSlider').value + "%"
            };
        }

        function exportClinicalSettings() {
            const report = generateClinicalReport("Two-Tone Comparison", getReportData());
            const blob = new Blob([report], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `tinnitus_clinical_twotone.txt`;
            a.click();
        }

        function emailToAudiologist() {
            const email = loadSetting('audiologist_email', '');
            if (!email) return alert("Please set your audiologist's email on the Home page.");
            const report = generateClinicalReport("Two-Tone Comparison", getReportData());
            window.location.href = `mailto:${email}?subject=Tinnitus Clinical Report&body=${encodeURIComponent(report)}`;
        }

        document.getElementById('freqASlider').oninput = updateUI;
        document.getElementById('freqBSlider').oninput = updateUI;
        document.getElementById('volSlider').oninput = updateUI;
        document.getElementById('freqAInput').oninput = e => { document.getElementById('freqASlider').value = e.target.value; updateUI(); };
        document.getElementById('freqBInput').oninput = e => { document.getElementById('freqBSlider').value = e.target.value; updateUI(); };
    </script>
</body>
</html>
