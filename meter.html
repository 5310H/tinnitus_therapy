<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Level Meter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="storage.js"></script>
<script src="nav.js"></script>
<style>.meter-bar { width:100%; height:30px; background:var(--surface); margin:10px 0; border-radius:10px; overflow:hidden; position: relative; }
.meter-fill { height:100%; width:0%; background:var(--accent); transition: width 0.1s; }
.meter-peak { position: absolute; top: 0; height: 100%; width: 3px; background: var(--text); transition: left 0.1s; pointer-events: none; }</style>
</head>
<body>
<div class="panel">
<h1>Audio Level Meter</h1>
<p class="info">Shows real‑time audio amplitude and clinical calibration status.</p>

<div id="validationBox" class="match-section" style="display:none; margin-bottom: 20px;">
    <h3>Clinical Calibration Check</h3>
    <p id="clipWarning" style="color:#ef5350; font-weight:bold; display:none;">⚠️ SIGNAL CLIPPING DETECTED: Reduce system volume.</p>
    <p id="floorCheck">Noise Floor: Measuring...</p>
</div>

<div class="card">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div class="meter-bar" style="flex: 1;">
            <div class="meter-fill" id="fill"></div>
            <div class="meter-peak" id="peak" style="left: 0%;"></div>
        </div>
        <div id="dbVal" style="width: 75px; font-weight: bold; color: var(--accent); font-size: 1.1rem; text-align: right;">-100 dB</div>
    </div>
    <button class="button" onclick="start()">Start</button>
    <button class="button stop-btn" onclick="stop()">Stop</button>
</div>
</div>
<script>
window.onload = () => initNav(`
    <b>Purpose:</b> This tool measures the real-time volume (amplitude) and monitors for signal clipping.<br><br>
    <b>Usage:</b> Use this to calibrate your therapy levels. Many researchers suggest therapy sounds should be adjusted to a "mixing point" where they just begin to blend with your tinnitus or the ambient room noise.<br><br>
    <b>Note:</b> This tool is passive and does not produce sound.
`);
let audioCtx=null, analyser, source, raf, streamRef=null, peakLevel=0, lastPeakUpdate=0;

function start(){
    document.getElementById("validationBox").style.display = "block";
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
        streamRef = stream;
        source=audioCtx.createMediaStreamSource(stream);
        analyser=audioCtx.createAnalyser();
        analyser.fftSize=256;
        source.connect(analyser);
        draw();
    }).catch(err => {
        alert("Microphone access is required for the meter to function.");
    });
}

function stop(){ 
    if(raf) cancelAnimationFrame(raf);
    if(streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
    }
    document.getElementById("validationBox").style.display = "none";
    document.getElementById("fill").style.width = "0%";
    document.getElementById("peak").style.left = "0%";
    document.getElementById("dbVal").textContent = "-100 dB";
    document.getElementById("fill").style.background = "var(--accent)";
    peakLevel = 0;
}

function draw(){
    const data=new Uint8Array(analyser.frequencyBinCount);
    const fill=document.getElementById("fill");
    const peak=document.getElementById("peak");
    const dbText=document.getElementById("dbVal");
    const clipMsg=document.getElementById("clipWarning");
    const floorMsg=document.getElementById("floorCheck");

    function loop(){
        analyser.getByteFrequencyData(data);
        const avg=data.reduce((a,b)=>a+b)/data.length;
        fill.style.width=(avg/255*100)+"%";

        // Smoothly transition from teal (140) to red (0) based on amplitude
        const hue = Math.max(0, 140 - (avg / 255) * 140);
        fill.style.background = `hsl(${hue}, 80%, 50%)`;

        // Calculate dB based on AnalyserNode defaults (-100 to -30 dB)
        const db = Math.round(analyser.minDecibels + (avg / 255) * (analyser.maxDecibels - analyser.minDecibels));
        dbText.textContent = db + " dB";

        // Clinical Validation Logic
        const isClipping = data.some(val => val >= 250);
        clipMsg.style.display = isClipping ? "block" : "none";
        if (db < -80) floorMsg.textContent = "Noise Floor: Clean (Low Ambient Noise)";
        else floorMsg.textContent = "Noise Floor: High (Check Surroundings)";

        const now = performance.now();
        if (avg >= peakLevel) {
            peakLevel = avg;
            lastPeakUpdate = now;
        } else if (now - lastPeakUpdate > 2000) {
            peakLevel = Math.max(avg, peakLevel * 0.98); // Decay after 2-second hold
        }
        peak.style.left = (peakLevel / 255 * 100) + "%";

        raf=requestAnimationFrame(loop);
    }
    loop();
}
</script>

</body>
</html>
