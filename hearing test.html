<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hearing Range Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:Arial; background:#f4f4f4; padding:20px; text-align:center; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 0 6px rgba(0,0,0,0.1); margin-bottom:20px; }
.button { background:#0078ff; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; margin:8px; display:inline-block; }
</style>
</head>
<body>

<h1>Hearing Range Test</h1>
<p>Tap each button to test audibility</p>

<div class="card">
    <button class="button" onclick="play(250)">250 Hz</button>
    <button class="button" onclick="play(500)">500 Hz</button>
    <button class="button" onclick="play(1000)">1 kHz</button>
    <button class="button" onclick="play(2000)">2 kHz</button>
    <button class="button" onclick="play(4000)">4 kHz</button>
    <button class="button" onclick="play(8000)">8 kHz</button>
    <button class="button" onclick="play(12000)">12 kHz</button>
    <button class="button" onclick="play(16000)">16 kHz</button>
</div>

<button class="button" onclick="stop()">Stop</button>

<script>
let ctx=null, osc=null;
function play(freq){
    if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
    stop();
    osc=ctx.createOscillator();
    osc.type="sine";
    osc.frequency.value=freq;
    osc.connect(ctx.destination);
    osc.start();
}
function stop(){ if(osc){ osc.stop(); osc.disconnect(); osc=null; } }
</script>

</body>
</html>
