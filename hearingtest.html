<!DOCTYPE html>
<html lang="en">
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
a.back{position:fixed;top:1rem;left:1rem;color:#ab47bc;text-decoration:none;font-size:.9rem;z-index:10}
.panel{max-width:520px;width:90%;margin:3rem auto}
h1{font-size:1.8rem;margin-bottom:.3rem;color:#ab47bc;text-align:center}
.info{color:#888;font-size:.85rem;margin-bottom:2rem;text-align:center}
</style>
<meta charset="UTF-8">
<title>Hearing Range Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
    text-align: center;
    margin: 0;
}

/* TOP BAR */
.top-bar {
    width: 100%;
    background: #0078ff;
    padding: 12px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 20;
}
.dark-btn {
    background: #222;
    color: #fff;
    border: none;
    padding: 10px 16px;
    margin: 0 10px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
}
.dark-btn:active { background: #444; }

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 6px rgba(0,0,0,0.1);
    margin-top: 80px;
}

.button {
    background: #0078ff;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    margin: 8px;
    display: inline-block;
    cursor: pointer;
    font-size: 16px;
}
.button:active { background: #005fcc; }

.section-title {
    font-weight: bold;
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body><a class="back" href="index.html">Home</a>

<!-- TOP BAR -->
<div class="top-bar">
    <button class="dark-btn" onclick="location.href='index.html'">Home</button>
    <button class="dark-btn" onclick="stopTone()">Stop</button>
</div>

<h1 style="margin-top:70px;">Hearing Range Test</h1>
<p>Tap each button to test audibility</p>

<div class="card">

    <div class="section-title">Low Frequencies</div>
    <button class="button" onclick="play(20)">20 Hz</button>
    <button class="button" onclick="play(40)">40 Hz</button>
    <button class="button" onclick="play(80)">80 Hz</button>
    <button class="button" onclick="play(125)">125 Hz</button>
    <button class="button" onclick="play(250)">250 Hz</button>

    <div class="section-title">Mid Frequencies</div>
    <button class="button" onclick="play(500)">500 Hz</button>
    <button class="button" onclick="play(750)">750 Hz</button>
    <button class="button" onclick="play(1000)">1 kHz</button>
    <button class="button" onclick="play(1500)">1.5 kHz</button>
    <button class="button" onclick="play(2000)">2 kHz</button>

    <div class="section-title">High Frequencies</div>
    <button class="button" onclick="play(3000)">3 kHz</button>
    <button class="button" onclick="play(4000)">4 kHz</button>
    <button class="button" onclick="play(6000)">6 kHz</button>
    <button class="button" onclick="play(8000)">8 kHz</button>

    <div class="section-title">Very High Frequencies</div>
    <button class="button" onclick="play(10000)">10 kHz</button>
    <button class="button" onclick="play(12000)">12 kHz</button>
    <button class="button" onclick="play(14000)">14 kHz</button>
    <button class="button" onclick="play(16000)">16 kHz</button>
    <button class="button" onclick="play(18000)">18 kHz</button>
    <button class="button" onclick="play(20000)">20 kHz</button>

</div>

<script>
let ctx = null;
let osc = null;

/* PLAY TONE */
function play(freq) {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();

    stopTone(); // ensure only one tone plays

    osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;

    const gain = ctx.createGain();
    gain.gain.value = 0.2;

    osc.connect(gain).connect(ctx.destination);
    osc.start();
}

/* STOP TONE */
function stopTone() {
    if (osc) {
        try { osc.stop(); } catch(e) {}
        osc = null;
    }
}
</script>

</body>
</html>
