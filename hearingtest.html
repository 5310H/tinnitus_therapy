<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="style.css">
<script src="storage.js"></script>
<script src="nav.js"></script>
</head>
<body>
<div class="panel">
<h1>Hearing Range Test</h1>
<p>Tap each button to test audibility</p>
<div class="card">
    <div class="section-title">Low Frequencies</div>
    <button class="button" onclick="play(20)">20 Hz</button>
    <button class="button" onclick="play(40)">40 Hz</button>
    <button class="button" onclick="play(80)">80 Hz</button>
    <button class="button" onclick="play(125)">125 Hz</button>
    <button class="button" onclick="play(250)">250 Hz</button>

    <div class="section-title">Mid Frequencies</div>
    <button class="button" onclick="play(500)">500 Hz</button>
    <button class="button" onclick="play(750)">750 Hz</button>
    <button class="button" onclick="play(1000)">1 kHz</button>
    <button class="button" onclick="play(1500)">1.5 kHz</button>
    <button class="button" onclick="play(2000)">2 kHz</button>

    <div class="section-title">High Frequencies</div>
    <button class="button" onclick="play(3000)">3 kHz</button>
    <button class="button" onclick="play(4000)">4 kHz</button>
    <button class="button" onclick="play(6000)">6 kHz</button>
    <button class="button" onclick="play(8000)">8 kHz</button>

    <div class="section-title">Very High Frequencies</div>
    <button class="button" onclick="play(10000)">10 kHz</button>
    <button class="button" onclick="play(12000)">12 kHz</button>
    <button class="button" onclick="play(14000)">14 kHz</button>
    <button class="button" onclick="play(16000)">16 kHz</button>
    <button class="button" onclick="play(18000)">18 kHz</button>
    <button class="button" onclick="play(20000)">20 kHz</button>

    <div style="margin-top: 25px; border-top: 1px dashed var(--border); padding-top: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="button" onclick="exportClinicalSettings()">Clinical Export (.txt)</button>
        <button class="button" style="background:var(--accent); color:white;" onclick="emailToAudiologist()">Email to Audiologist</button>
    </div>
</div>

<script>
window.onload = () => {
    initNav("This tool allows you to check audibility across a wide spectrum. <b>Note:</b> This is a digital exploration tool and does not replace a clinical audiogram.");
};

let ctx = null;
let osc = null;

/* PLAY TONE */
function play(freq) {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();

    stopTone(); // ensure only one tone plays

    osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;

    const gain = ctx.createGain();
    gain.gain.value = 0.2;

    osc.connect(gain).connect(ctx.destination);
    osc.start();
}

/* STOP TONE */
function stopTone() {
    if (osc) {
        try { osc.stop(); } catch(e) {}
        osc = null;
    }
}

function getReportData() {
    return { "Test Performed": "Hearing Range Audibility Test" };
}

function exportClinicalSettings() {
    const report = generateClinicalReport("Hearing Range Test", getReportData());
    const blob = new Blob([report], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tinnitus_clinical_hearing_test.txt`;
    a.click();
}

function emailToAudiologist() {
    const email = loadSetting('audiologist_email', '');
    if (!email) return alert("Please set your audiologist's email on the Home page.");
    const report = generateClinicalReport("Hearing Range Test", getReportData());
    window.location.href = `mailto:${email}?subject=Tinnitus Clinical Report&body=${encodeURIComponent(report)}`;
}
</script>

</body>
</html>
