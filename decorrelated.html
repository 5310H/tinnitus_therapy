<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decorrelated Noise Therapy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
a.back{position:fixed;top:1rem;left:1rem;color:#4fc3f7;text-decoration:none;font-size:.9rem;z-index:10}
.panel{max-width:520px;width:90%;margin:3rem auto;text-align:center}
h1{font-size:1.8rem;margin-bottom:.3rem;color:#4fc3f7}
.info{color:#888;font-size:.85rem;margin-bottom:2rem}
.ctrl{margin:1rem 0;text-align:left}
.ctrl label{display:block;font-size:.85rem;color:#aaa;margin-bottom:.3rem}
.ctrl input[type=range]{width:100%;accent-color:#4fc3f7}
.val{float:right;color:#4fc3f7;font-size:.85rem}
select{width:100%;padding:.6rem;background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:8px;font-size:1rem}
.big-btn{width:100%;padding:1rem;margin-top:1.5rem;font-size:1.2rem;border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:all .2s}
.play-btn{background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#0a0a1a}
.stop-btn{background:linear-gradient(135deg,#ef5350,#e53935);color:#fff}
.big-btn:hover{transform:scale(1.02)}
.status{margin-top:1rem;font-size:.9rem;color:#888;min-height:1.5rem}
</style>
</head>
<body>
<a class="back" href="index.html">Home</a>
<div class="panel">
<h1>Decorrelated Noise</h1>
<p class="info">Independent noise streams per ear reduce central auditory pattern-matching, promoting habituation.</p>
<div class="ctrl">
  <label>Noise Color</label>
  <select id="color">
    <option value="white">White Noise (flat spectrum)</option>
    <option value="pink" selected>Pink Noise (-3 dB/octave)</option>
    <option value="brown">Brown Noise (-6 dB/octave)</option>
  </select>
</div>
<div class="ctrl">
  <label>Volume <span class="val" id="volVal">40%</span></label>
  <input type="range" id="vol" min="0" max="100" value="40">
</div>
<div class="ctrl">
  <label>Decorrelation Amount <span class="val" id="decVal">100%</span></label>
  <input type="range" id="dec" min="0" max="100" value="100">
</div>
<div class="ctrl">
  <label>Low-Cut Frequency <span class="val" id="lcVal">80 Hz</span></label>
  <input type="range" id="lc" min="20" max="500" value="80">
</div>
<div class="ctrl">
  <label>High-Cut Frequency <span class="val" id="hcVal">14000 Hz</span></label>
  <input type="range" id="hc" min="2000" max="20000" value="14000" step="100">
</div>
<button class="big-btn play-btn" id="toggleBtn" onclick="toggle()">Start Therapy</button>
<div class="status" id="status"></div>
</div>
<script>
let ctx, playing=false, nodesL, nodesR;
const BUF_SIZE=2*44100;
function createNoise(color){
  const buf=ctx.createBuffer(1,BUF_SIZE,ctx.sampleRate);
  const d=buf.getChannelData(0);
  if(color==='white'){for(let i=0;i<BUF_SIZE;i++)d[i]=Math.random()*2-1}
  else if(color==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<BUF_SIZE;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8687*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926}}
  else{let last=0;for(let i=0;i<BUF_SIZE;i++){const w=Math.random()*2-1;d[i]=(last+.02*w)/1.02;last=d[i];d[i]*=3.5}}
  return buf;
}
function makeChain(buf,vol,lc,hc){
  const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
  const g=ctx.createGain();g.gain.value=vol;
  const lo=ctx.createBiquadFilter();lo.type='highpass';lo.frequency.value=lc;
  const hi=ctx.createBiquadFilter();hi.type='lowpass';hi.frequency.value=hc;
  const pan=ctx.createStereoPanner();
  src.connect(lo);lo.connect(hi);hi.connect(g);g.connect(pan);pan.connect(ctx.destination);
  return{src,gain:g,lo,hi,pan};
}
function toggle(){if(!playing) start(); else stop()}
function start(){
  ctx=new(window.AudioContext||window.webkitAudioContext)();
  const color=document.getElementById('color').value;
  const vol=document.getElementById('vol').value/100;
  const dec=document.getElementById('dec').value/100;
  const lc=+document.getElementById('lc').value;
  const hc=+document.getElementById('hc').value;
  const bufL=createNoise(color);
  const bufR=dec>0?createNoise(color):bufL;
  nodesL=makeChain(bufL,vol,lc,hc);
  nodesR=makeChain(bufR,vol,lc,hc);
  nodesL.pan.pan.value=-1;
  nodesR.pan.pan.value=1;
  nodesL.src.start();nodesR.src.start();
  playing=true;
  document.getElementById('toggleBtn').textContent='Stop';
  document.getElementById('toggleBtn').className='big-btn stop-btn';
  document.getElementById('status').textContent='Playing '+color+' noise, '+Math.round(dec*100)+'% decorrelation';
}
function stop(){
  if(ctx){ctx.close();ctx=null}
  playing=false;
  document.getElementById('toggleBtn').textContent='Start Therapy';
  document.getElementById('toggleBtn').className='big-btn play-btn';
  document.getElementById('status').textContent='Stopped';
}
document.getElementById('vol').oninput=e=>{document.getElementById('volVal').textContent=e.target.value+'%';if(playing&&nodesL){const v=e.target.value/100;nodesL.gain.gain.value=v;nodesR.gain.gain.value=v}};
document.getElementById('dec').oninput=e=>document.getElementById('decVal').textContent=e.target.value+'%';
document.getElementById('lc').oninput=e=>{document.getElementById('lcVal').textContent=e.target.value+' Hz';if(playing){nodesL.lo.frequency.value=+e.target.value;nodesR.lo.frequency.value=+e.target.value}};
document.getElementById('hc').oninput=e=>{document.getElementById('hcVal').textContent=e.target.value+' Hz';if(playing){nodesL.hi.frequency.value=+e.target.value;nodesR.hi.frequency.value=+e.target.value}};
</script>
</body>
</html>
