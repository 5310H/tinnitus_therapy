<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lenire‑Style Sound Therapy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    /* Top bar like notch.html */
    .top-bar {
        width: 100%;
        background: #0078ff;
        color: white;
        padding: 12px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .top-bar button {
        background: white;
        color: #0078ff;
        border: none;
        padding: 10px 16px;
        margin: 0 10px;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
    }

    h1 {
        margin-top: 20px;
        margin-bottom: 5px;
    }

    .control-group {
        background: white;
        padding: 15px;
        margin: 15px;
        border-radius: 10px;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    button {
        padding: 12px 20px;
        margin: 8px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #0078ff;
        color: white;
        cursor: pointer;
    }

    button:active {
        background: #005fcc;
    }

    input[type=range] {
        width: 90%;
    }
</style>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="stopAll()">Stop</button>
</div>

<h1>Lenire‑Style Sound Therapy</h1>
<p>Experimental sound‑only version inspired by Lenire’s auditory component</p>

<div class="control-group">
    <h3>Lenire‑Style Tone Bursts</h3>
    <button onclick="playLenire()">Start Lenire Mode</button>
</div>

<div class="control-group">
    <h3>Volume</h3>
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.3" oninput="setVolume(this.value)">
</div>

<div class="control-group">
    <h3>Left / Right Balance</h3>
    <input id="balance" type="range" min="-1" max="1" step="0.01" value="0" oninput="setBalance(this.value)">
</div>

<div class="control-group">
    <h3>Session Timer (minutes)</h3>
    <input id="timer" type="number" min="1" max="120" value="10">
    <button onclick="startTimer()">Start Timer</button>
    <p id="timerDisplay"></p>
</div>

<script>
let audioCtx;
let gainNode;
let pannerNode;
let timerInterval;
let currentSource = null;

// Init audio
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        pannerNode = audioCtx.createStereoPanner();
        gainNode.connect(pannerNode).connect(audioCtx.destination);
    }
}

// Lenire‑style tone bursts
function playLenire() {
    initAudio();
    stopAll();

    const osc = audioCtx.createOscillator();
    const amp = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 4000;

    amp.gain.value = 0;

    osc.connect(amp).connect(gainNode);
    osc.start();

    currentSource = osc;

    // Burst pattern
    function burst() {
        amp.gain.setValueAtTime(0, audioCtx.currentTime);
        amp.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);
        amp.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
    }

    burst();
    setInterval(burst, 300);
}

// Volume
function setVolume(v) {
    initAudio();
    gainNode.gain.value = v;
}

// Balance
function setBalance(v) {
    initAudio();
    pannerNode.pan.value = v;
}

// Timer
function startTimer() {
    const minutes = parseInt(document.getElementById("timer").value);
    let remaining = minutes * 60;

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        remaining--;
        document.getElementById("timerDisplay").innerText =
            "Time left: " + Math.floor(remaining / 60) + ":" + (remaining % 60).toString().padStart(2, '0');

        if (remaining <= 0) {
            stopAll();
            clearInterval(timerInterval);
            document.getElementById("timerDisplay").innerText = "Session complete";
        }
    }, 1000);
}

// Stop everything
function stopAll() {
    if (currentSource) {
        try { currentSource.stop(); } catch(e) {}
        currentSource = null;
    }
}
</script>

</body>
</html>
