<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lenire‑Style Sound Module</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    /* --- ADDED TOP BAR --- */
    .top-bar {
        width: 100%;
        background: #0078ff;
        color: white;
        padding: 12px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: -20px;
        margin-bottom: 10px;
    }

    .dark-btn {
        background: #333;
        color: #fff;
        border: none;
        padding: 10px 16px;
        margin: 0 10px;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
    }

    .dark-btn:active {
        background: #555;
    }

    /* ⭐ HELP BUTTON (added) ⭐ */
    .help-btn {
        background:#333;
        color:#fff;
        border:none;
        padding:10px 16px;
        margin-right:10px;
        border-radius:6px;
        font-size:15px;
        cursor:pointer;
        font-weight:bold;
    }
    .help-btn:hover { background:#555; }

    h1 { margin-bottom: 5px; }
    p  { margin-top: 0; font-size: 14px; }
    .panel {
        max-width: 480px;
        margin: 10px auto;
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 4px rgba(0,0,0,0.1);
        text-align: left;
    }
    label { display: block; margin: 8px 0 4px; font-size: 14px; }
    input[type="number"], input[type="range"], select {
        width: 100%;
        box-sizing: border-box;
    }
    button {
        margin-top: 12px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #0078ff;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
    }
    button:disabled {
        background: #999;
        cursor: default;
    }
    .timer {
        text-align: center;
        font-size: 16px;
        margin-top: 10px;
        font-weight: bold;
    }
    small { font-size: 12px; color: #555; }
</style>
</head>
<body>

<!-- ADDED TOP BAR -->
<div class="top-bar">
    <button class="dark-btn" onclick="location.href='index.html'">Home</button>
    <button class="dark-btn" onclick="stopSession()">Stop</button>
    <button class="help-btn" onclick="openHelp()">Help</button>
</div>
<!-- END ADDED -->

<h1>Lenire‑Style Sound Module</h1>
<p>Experimental sound‑only tinnitus therapy (no electrical stimulation, no medical claims).</p>

<div class="panel">
    <label for="freq">Carrier frequency (Hz)</label>
    <input id="freq" type="number" min="200" max="12000" step="10" value="8000">

    <label for="session">Session length</label>
    <select id="session">
        <option value="600">10 minutes</option>
        <option value="900">15 minutes</option>
        <option value="1200" selected>20 minutes</option>
        <option value="1800">30 minutes</option>
    </select>

    <label for="volume">Master volume</label>
    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.3">

    <label for="mix">Tone / Noise mix (0 = noise only, 1 = tone only)</label>
    <input id="mix" type="range" min="0" max="1" step="0.01" value="0.5">

    <label for="modRate">Noise modulation rate (Hz)</label>
    <input id="modRate" type="number" min="0.1" max="10" step="0.1" value="2.0">

    <label for="burstRate">Tone burst rate (Hz)</label>
    <input id="burstRate" type="number" min="0.2" max="10" step="0.1" value="1.5">

    <button id="startBtn">Start session</button>
    <button id="stopBtn" disabled>Stop</button>

    <div class="timer" id="timer">Session: 00:00 / 20:00</div>

    <small>
        Use at comfortable listening levels. This is an experimental sound tool, not a medical device.
    </small>
</div>

<script>
let audioCtx = null;
let masterGain, toneGain, noiseGain;
let toneOsc, noiseSource, noiseFilter;
let noiseModOsc, noiseModGain;
let burstOsc, burstGain;
let running = false;
let sessionSeconds = 1200;
let remaining = 0;
let timerId = null;

const freqEl = document.getElementById('freq');
const sessionEl = document.getElementById('session');
const volumeEl = document.getElementById('volume');
const mixEl = document.getElementById('mix');
const modRateEl = document.getElementById('modRate');
const burstRateEl = document.getElementById('burstRate');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const timerEl = document.getElementById('timer');

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerDisplay() {
    const total = sessionSeconds;
    const elapsed = total - remaining;
    timerEl.textContent = `Session: ${formatTime(elapsed)} / ${formatTime(total)}`;
}

function createNoiseBuffer(ctx) {
    const length = ctx.sampleRate * 2;
    const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < length; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    return buffer;
}

function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(volumeEl.value);
    masterGain.connect(audioCtx.destination);

    toneOsc = audioCtx.createOscillator();
    toneOsc.type = 'sine';
    toneOsc.frequency.value = parseFloat(freqEl.value);

    toneGain = audioCtx.createGain();
    toneGain.gain.value = parseFloat(mixEl.value);

    toneOsc.connect(toneGain).connect(masterGain);

    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = createNoiseBuffer(audioCtx);
    noiseSource.loop = true;

    noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = parseFloat(freqEl.value);
    noiseFilter.Q.value = 1.5;

    noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 1.0 - parseFloat(mixEl.value);

    noiseSource.connect(noiseFilter).connect(noiseGain).connect(masterGain);

    noiseModOsc = audioCtx.createOscillator();
    noiseModOsc.type = 'sine';
    noiseModOsc.frequency.value = parseFloat(modRateEl.value);

    noiseModGain = audioCtx.createGain();
    noiseModGain.gain.value = 0.4;

    noiseModOsc.connect(noiseModGain);
    noiseModGain.connect(noiseGain.gain);

    burstOsc = audioCtx.createOscillator();
    burstOsc.type = 'square';
    burstOsc.frequency.value = parseFloat(burstRateEl.value);

    burstGain = audioCtx.createGain();
    burstGain.gain.value = 0.5;

    burstOsc.connect(burstGain);
    burstGain.connect(toneGain.gain);

    toneOsc.start();
    noiseSource.start();
    noiseModOsc.start();
    burstOsc.start();
}

function updateParams() {
    if (!audioCtx) return;
    const freq = parseFloat(freqEl.value);
    const mix = parseFloat(mixEl.value);
    const modRate = parseFloat(modRateEl.value);
    const burstRate = parseFloat(burstRateEl.value);
    const vol = parseFloat(volumeEl.value);

    toneOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    noiseFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);

    masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
    toneGain.gain.setTargetAtTime(mix, audioCtx.currentTime, 0.05);
    noiseGain.gain.setTargetAtTime(1.0 - mix, audioCtx.currentTime, 0.05);

    noiseModOsc.frequency.setTargetAtTime(modRate, audioCtx.currentTime, 0.05);
    burstOsc.frequency.setTargetAtTime(burstRate, audioCtx.currentTime, 0.05);
}

function startSession() {
    if (running) return;
    sessionSeconds = parseInt(sessionEl.value, 10);
    remaining = sessionSeconds;

    if (!audioCtx) {
        setupAudio();
    }

    updateParams();
    running = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;

    updateTimerDisplay();
    timerId = setInterval(() => {
        if (!running) return;
        remaining--;
        if (remaining <= 0) {
            stopSession();
            return;
        }
        updateTimerDisplay();
    }, 1000);
}

function stopSession() {
    running = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    if (timerId) {
        clearInterval(timerId);
        timerId = null;
    }
    remaining = 0;
    updateTimerDisplay();
}

startBtn.addEventListener('click', () => startSession());
stopBtn.addEventListener('click', () => stopSession());

[freqEl, volumeEl, mixEl, modRateEl, burstRateEl].forEach(el => {
    el.addEventListener('input', updateParams);
});
</script>

<!-- ⭐ HELP MODAL (added, no code removed) ⭐ -->
<div id="helpModal" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(4px);
    z-index:9999;
    padding:20px;
">
    <div style="
        max-width:500px;
        margin:60px auto;
        background:#fff;
        color:#000;
        padding:20px;
        border-radius:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.3);
        text-align:left;
    ">
        <h2 style="margin-top:0;">How to Use This Therapy</h2>
        <div id="helpContent" style="font-size:15px; line-height:1.5;"></div>

        <button onclick="closeHelp()" style="
            margin-top:20px;
            width:100%;
            padding:12px;
            background:#0078ff;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        ">Close</button>
    </div>
</div>

<script>
function openHelp() {
    document.getElementById("helpModal").style.display = "block";
}
function closeHelp() {
    document.getElementById("helpModal").style.display = "none";
}
</script>

<!-- ⭐ LENIRE HELP CONTENT ⭐ -->
<script>
document.getElementById("helpContent").innerHTML = `
<b>Purpose:</b><br>
This module simulates the sound‑only component of Lenire therapy using tone bursts and modulated noise.<br><br>

<b>Setup:</b><br>
• Use headphones.<br>
• Set carrier frequency near your tinnitus pitch.<br>
• Adjust tone/noise mix for comfort.<br><br>

<b>Usage Plan:</b><br>
• 20 minutes per session (default).<br>
• 1–2 sessions per day.<br><br>

<b>Tips:</b><br>
• If tone is too sharp, increase noise mix.<br>
• If noise is too harsh, lower modulation rate.<br><br>

<b>Safety:</b><br>
• Keep volume low.<br>
• Stop if you feel discomfort.
`;
</script>

</body>
</html>
