<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lenire Sound Therapy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    /* Top bar (added) */
    .top-bar {
        width: 100%;
        background: #0078ff;
        color: white;
        padding: 12px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: -20px;
        margin-bottom: 10px;
    }

    /* Dark-style buttons ONLY */
    .dark-btn {
        background: #333;
        color: #fff;
        border: none;
        padding: 10px 16px;
        margin: 0 10px;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
    }

    .dark-btn:active {
        background: #555;
    }

    button {
        padding: 12px 20px;
        margin: 8px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #0078ff;
        color: white;
        cursor: pointer;
    }

    button:active {
        background: #005fcc;
    }

    input[type=range] {
        width: 90%;
    }
</style>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
    <button class="dark-btn" onclick="location.href='index.html'">Home</button>
    <button class="dark-btn" onclick="stopAll()">Stop</button>
</div>

<h1>Lenire Sound Therapy</h1>
<p>Experimental tone‑burst stimulation</p>

<button onclick="startLenire()">Start Lenire Mode</button>

<h3>Volume</h3>
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.3" oninput="setVolume(this.value)">

<h3>Left / Right Balance</h3>
<input id="balance" type="range" min="-1" max="1" step="0.01" value="0" oninput="setBalance(this.value)">

<h3>Session Timer (minutes)</h3>
<input id="timer" type="number" min="1" max="120" value="10">
<button onclick="startTimer()">Start Timer</button>
<p id="timerDisplay"></p>

<script>
let audioCtx;
let gainNode;
let pannerNode;
let currentSource = null;
let timerInterval;

/* AUDIO INIT */
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        pannerNode = audioCtx.createStereoPanner();
        gainNode.connect(pannerNode).connect(audioCtx.destination);
    }
}

/* ORIGINAL LENIRE LOGIC (unchanged) */
function startLenire() {
    initAudio();
    stopAll();

    const osc = audioCtx.createOscillator();
    const amp = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 4000;
    amp.gain.value = 0;

    osc.connect(amp).connect(gainNode);
    osc.start();

    currentSource = osc;

    function burst() {
        amp.gain.setValueAtTime(0, audioCtx.currentTime);
        amp.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);
        amp.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
    }

    burst();
    setInterval(burst, 300);
}

/* VOLUME */
function setVolume(v) {
    initAudio();
    gainNode.gain.value = v;
}

/* BALANCE */
function setBalance(v) {
    initAudio();
    pannerNode.pan.value = v;
}

/* TIMER */
function startTimer() {
    const minutes = parseInt(document.getElementById("timer").value);
    let remaining = minutes * 60;

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        remaining--;
        document.getElementById("timerDisplay").innerText =
            "Time left: " + Math.floor(remaining / 60) + ":" + (remaining % 60).toString().padStart(2, '0');

        if (remaining <= 0) {
            stopAll();
            clearInterval(timerInterval);
            document.getElementById("timerDisplay").innerText = "Session complete";
        }
    }, 1000);
}

/* STOP */
function stopAll() {
    if (currentSource) {
        try { currentSource.stop(); } catch(e) {}
        currentSource = null;
    }
}
</script>

</body>
</html>
